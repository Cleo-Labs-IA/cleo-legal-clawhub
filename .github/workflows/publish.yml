name: publish

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Tag to publish (e.g. v1.2.2). Must already exist and match package.json version.'
        required: true
        type: string

jobs:
  publish-clawhub:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.tag || github.ref }}

      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Verify tag matches package.json
        env:
          DISPATCH_TAG: ${{ github.event.inputs.tag }}
        run: |
          if [ -n "$DISPATCH_TAG" ]; then
            TAG="${DISPATCH_TAG#v}"
          else
            TAG="${GITHUB_REF#refs/tags/v}"
          fi
          PJ=$(node -e "console.log(require('./package.json').version)")
          if [ "$TAG" != "$PJ" ]; then
            echo "Tag $TAG does not match package.json version $PJ"
            exit 1
          fi

      - name: Install clawhub CLI
        run: npm install -g clawhub

      - name: Publish to ClawHub
        env:
          CLAWHUB_TOKEN: ${{ secrets.CLAWHUB_TOKEN }}
        run: |
          clawhub login --token "$CLAWHUB_TOKEN"
          clawhub package publish .

  publish-npm:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.tag || github.ref }}

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          registry-url: 'https://registry.npmjs.org'

      - name: Verify token user (debug)
        run: npm whoami
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Publish to npm
        run: npm publish --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
